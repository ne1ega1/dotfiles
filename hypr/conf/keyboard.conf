# ----------------------------------------------------- 
# Keyboard Layout
# -----------------------------------------------------
input {
    kb_layout = us, ru
    kb_options = grp:lalt_lshift_toggle
    follow_mouse = 1
    mouse_refocus = false
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0.5 # -1.0 - 1.0, 0 means no modification.
    force_no_accel = 0
    accel_profile = flat
}
